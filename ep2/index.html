<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EP.2 您有 615 則留言｜核電存廢篇</title>
<meta property="og:title" content="EP.2 您有 615 則留言｜核電存廢篇">
<meta property="og:description" content="扮演貼文作者，面對 6 則真實留言情境。你的每一個「隱藏」都在塑造自己的同溫層。敬請期待。">
<meta property="og:image" content="https://scatjay.github.io/nuke-or-not/cover.png">
<style>
  :root {
    --bg: #020617;
    --bg2: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --accent: #e94560;
    --muted: #94a3b8;
    --text: #f1f5f9;
    --green: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', '微軟正黑體', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .icon { font-size: 4rem; margin-bottom: 20px; animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(0.95)} }
  .badge {
    display: inline-block;
    background: rgba(148,163,184,0.1);
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 12px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }
  h1 { font-size: 1.8rem; font-weight: 900; line-height: 1.2; margin-bottom: 10px; }
  h1 span { color: var(--accent); }
  .desc {
    font-size: 0.95rem;
    color: var(--muted);
    max-width: 360px;
    line-height: 1.7;
    margin-bottom: 32px;
  }
  .coming-pill {
    display: inline-block;
    background: rgba(148,163,184,0.08);
    border: 1px dashed var(--border);
    color: var(--muted);
    font-size: 0.8rem;
    padding: 6px 20px;
    border-radius: 30px;
    font-style: italic;
    margin-bottom: 32px;
  }
  .back-btn {
    display: inline-block;
    padding: 10px 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.15s;
  }
  .back-btn:hover { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>
  <div class="icon">📬</div>
  <div class="badge">EP.2 ／ 核電存廢篇</div>
  <h1>您有 <span>615</span> 則留言</h1>
  <p class="desc">扮演貼文作者，面對 6 則真實留言情境。<br>你的每一個「隱藏」都在塑造自己的同溫層。</p>
  <div class="coming-pill">🔒 施工中，請稍候</div>
  <br>
  <a class="back-btn" href="../">← 回到遊戲首頁</a>
</body>
</html>
